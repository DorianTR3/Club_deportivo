<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alta de Usuarios Internos</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/alta_usuarios.css">
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header class="main-navbar">
        <a href="../../.env/index.html" class="nav-logo">Club Deportivo</a>
    </header>

    <div class="modal-contenedor">
        <div class="modal-cabecera">
            <h2>Registrar Nuevo Usuario Interno</h2>
            <p>Complete los datos para registrar un nuevo empleado del club.</p>
            <a href="../../.env/index.html" class="btn-cerrar" style="text-decoration: none; display: flex; align-items: center; justify-content: center;">&times;</a>
        </div>

        <form id="registro-form">
            
            <div class="seccion-formulario">
                <h3>Información Personal</h3>
                
                <div class="fila-grid">
                    <div class="grupo-input">
                        <label for="nombreCompleto">Nombre Completo *</label>
                        <input type="text" id="nombreCompleto" name="nombreCompleto" placeholder="Nombre completo" required>
                    </div>
                    <div class="grupo-input">
                        <label for="curp">CURP *</label>
                        <input type="text" id="curp" name="curp" placeholder="18 caracteres" maxlength="18" required>
                    </div>
                </div>

                <div class="fila-grid">
                    <div class="grupo-input">
                        <label for="correo">Correo Electrónico *</label>
                        <input type="email" id="correo" name="correo" placeholder="correo@ejemplo.com" required>
                    </div>
                    <div class="grupo-input">
                        <label for="telefono">Teléfono *</label>
                        <input type="tel" id="telefono" name="telefono" placeholder="55-1234-5678" required>
                    </div>
                </div>

                <div class="fila-grid">
                    <div class="grupo-input">
                        <label for="fechaNacimiento">Fecha de Nacimiento *</label>
                        <input type="date" id="fechaNacimiento" name="fechaNacimiento" required>
                    </div>
                    <div class="grupo-input">
                        <label for="sexo">Sexo *</label>
                        <select id="sexo" name="sexo" required>
                            <option value="Hombre">Hombre</option>
                            <option value="Mujer">Mujer</option>
                            <option value="No especificar">No especificar</option>
                        </select>
                    </div>
                </div>

                <div class="grupo-input ancho-completo">
                    <label for="direccion">Dirección *</label>
                    <input type="text" id="direccion" name="direccion" placeholder="Calle, número, colonia, ciudad" required>
                </div>
            </div>

            <div class="seccion-formulario">
                <h3>Datos Laborales</h3>
                
                <div class="fila-grid">
                    <div class="grupo-input">
                        <label for="rol">Rol en la Empresa *</label>
                        <select id="rol" name="rolDentroDeLaEmpresa" required>
                            <option value="instructor">Instructor</option>
                            <option value="Recepcionista">Recepcionista</option>
                            <option value="coordinador">Coordinador</option>
                            <option value="administrador">Administrador</option>
                            <option value="otro">Otro tipo</option>
                        </select>
                    </div>
                    <div class="grupo-input">
                        <label for="fechaAlta">Fecha de Alta *</label>
                        <input type="date" id="fechaAlta" name="fechaAlta" required>
                    </div>
                </div>

                <div class="grupo-input ancho-completo">
                    <label for="contrasena">Contraseña Temporal *</label>
                    <input type="password" id="contrasena" name="contrasena" placeholder="Asigne una contraseña" required>
                </div>
            </div>

            <div class="caja-info">
                El estado del usuario se asignará como "Activo" automáticamente al confirmar el registro. Los campos marcados con (*) son obligatorios.
            </div>

            <div class="acciones-formulario">
                <button type="button" class="btn-cancelar" onclick="window.location.href='../../.env/index.html'">Cancelar</button>
                <button type="submit" class="btn-registrar">Registrar Usuario</button>
            </div>

        </form>
    </div>

    <script>
        lucide.createIcons();

        // CONEXIÓN A TU PÁGINA (MODIFICAR SOCIO)
        document.getElementById('registro-form').addEventListener('submit', function(e) {
            e.preventDefault(); // Evitamos el error de "archivo no encontrado"
            
            const nombre = document.getElementById('nombreCompleto').value;
            
            // Preguntamos al usuario si quiere ir a editar el perfil recién creado
            if(confirm(`¡Usuario ${nombre} registrado!\n\n¿Deseas ir a la pantalla de edición para verificar los datos?`)) {
                // AQUÍ ESTÁ LA CONEXIÓN: Nos manda a tu página
                window.location.href = 'modificar_socio.html';
            } else {
                window.location.href = '../../.env/index.html';
            }
        });
    </script>

</body>
</html>
