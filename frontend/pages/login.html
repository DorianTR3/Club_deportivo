<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso | Club Social y Deportivo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    
    <link rel="stylesheet" href="../css/login.css">
    
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <header class="main-navbar">
        <a href="index.html" class="nav-logo">Club Deportivo</a>
    </header>

    <main class="login-container">
        <div class="login-card">
            
            <div class="brand-header">
                <a href="index.html" style="text-decoration: none;">
                    <div class="shield-container">
                        <i data-lucide="shield-check" class="shield-icon"></i>
                    </div>
                </a>
                <h1>Club Social y Deportivo</h1>
                <p class="portal-subtitle">Portal de acceso para socios e instructores</p>
            </div>

            <form id="form-login" class="login-form">
                <div class="input-field">
                    <label for="user-email">Correo electrónico</label>
                    <input type="email" id="user-email" placeholder="tu@correo.com" required>
                </div>

                <div class="input-field">
                    <label for="password">Contraseña</label>
                    <div class="password-control">
                        <input type="password" id="password" placeholder="Tu contraseña" required>
                        <button type="button" id="toggle-pass" class="eye-btn">
                            <i data-lucide="eye" id="eye-icon"></i>
                        </button>
                    </div>
                </div>

                <div class="error-msg" style="display: none; color: #dc2626; text-align: center; margin-bottom: 15px; font-weight: 600;"></div>
                
                <button type="submit" class="btn-submit">
                    <i data-lucide="log-in" style="width: 18px; height: 18px;"></i>
                    Iniciar Sesión
                </button>
            </form>

            <div class="test-credentials-box">
                <span class="test-tag">CREDENCIALES DE PRUEBA</span>
                <div class="test-item">
                    <strong>Socio:</strong> 
                    <span>carlos.mendoza@email.com / socio123</span>
                </div>
                <div class="test-item">
                    <strong>Instructor:</strong> 
                    <span>ana.torres@club.com / instructor123</span>
                </div>
            </div>
        </div>
    </main>

    <script>
        lucide.createIcons();

        const passInput = document.getElementById('password');
        const toggleBtn = document.getElementById('toggle-pass');
        const eyeIcon = document.getElementById('eye-icon');

        toggleBtn.addEventListener('click', () => {
            const isPass = passInput.type === 'password';
            passInput.type = isPass ? 'text' : 'password';
            const newIcon = isPass ? 'eye-off' : 'eye';
            eyeIcon.setAttribute('data-lucide', newIcon);
            lucide.createIcons();
        });

        // Proteger historial y redireccionar si ya hay sesión
document.addEventListener('DOMContentLoaded', () => {
    history.pushState(null, '', location.href);
    window.onpopstate = function () {
        history.go(1);
    };

    if (localStorage.getItem('token') && localStorage.getItem('usuario')) {
        redirigirPorRol(JSON.parse(localStorage.getItem('usuario')).rol);
    }
});

// Interceptar el formulario de login
document.getElementById('form-login').addEventListener('submit', async (e) => {
    e.preventDefault();
    
    // Tomamos los valores usando tus IDs exactos
    const email = document.getElementById('user-email').value;
    const contrasena = document.getElementById('password').value;
    const errorDiv = document.querySelector('.error-msg');
    
    // Limpiar errores viejos
    if (errorDiv) errorDiv.style.display = 'none';

    try {
        const respuesta = await fetch('http://localhost:3000/api/auth/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email, contrasena })
        });

        const data = await respuesta.json();

        // Si el backend rechaza el acceso (401 o 403)
        if (respuesta.status === 401 || respuesta.status === 403) {
            if (errorDiv) {
                errorDiv.textContent = data.error || "Credenciales inválidas";
                errorDiv.style.display = 'block';
            } else {
                alert(data.error || "Credenciales inválidas");
            }
            return;
        }

        // Si el acceso es correcto (200)
        if (respuesta.ok) {
            localStorage.setItem('token', data.token);
            localStorage.setItem('usuario', JSON.stringify(data.usuario));
            redirigirPorRol(data.usuario.rol);
        }
    } catch (error) {
        console.error("Error de conexión:", error);
        if (errorDiv) {
            errorDiv.textContent = "Error al conectar con el servidor.";
            errorDiv.style.display = 'block';
        }
    }
});

// Función para centralizar las rutas de destino 
// 
function redirigirPorRol(rol) {
    const rutasPorRol = {
        gerente: '../pages/homepage_gerente.html',
        admin: '../pages/homepage_admin.html',
        coordinador: '../pages/homepage_coordinador.html',
        instructor: '../pages/homepage_instructor.html',
        recepcion: '../pages/homepage_recepcion.html',
        socio: '../pages/homepage_socio.html'
    };
    // Si el rol no está en la lista, lo mandamos al index por seguridad
    window.location.href = rutasPorRol[rol] || '/index.html';
}
    </script>
</body>
</html>
